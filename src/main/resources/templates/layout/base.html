<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="UTF-8">
    <title>Sistema Escolar</title>

    <!-- ================= BOOTSTRAP 5 CDN (UNA SOLA VEZ) ================= -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- ================= DATATABLES ================= -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css"
          rel="stylesheet">

    <!-- Buttons extension (EXPORT) -->
    <!--
    <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css"
          rel="stylesheet">
    -->

    <style>
        body {
            overflow-x: hidden;
        }

        /* Navbar fija */
        .navbar-custom {
            height: 60px;
            z-index: 1050;
        }

        /* Sidebar overlay */
        #sidebar {
            position: fixed;
            top: 60px; /* debajo navbar */
            left: -250px;
            width: 250px;
            height: 100%;
            background: #212529; /* bg-dark */
            transition: all 0.3s;
            z-index: 1040;
        }

        #sidebar.active {
            left: 0;
        }

        /* Contenido principal */
        #main-content {
            margin-top: 60px;
            padding: 20px;
        }

        /* FUTURE MOBILE:
           convertir sidebar a offcanvas bootstrap
        */

        input[type="text"],textarea {
            text-transform: lowercase;
        }
    </style>

</head>

<body>

<!-- Navbar -->
<div th:replace="~{layout/navbar :: navbar}"></div>

<!-- Sidebar -->
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<!-- Contenido dinámico -->
<div id="main-content" class="container-fluid">
    <div th:replace="${content}"></div>
</div>


<!-- ================= JS ================= -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<!-- Buttons extension (comentado por ahora) -->
<!--
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
-->

<script>
    



    // ================= SIDEBAR =================
document.getElementById("toggleSidebar")
    ?.addEventListener("click", function () {
        document.getElementById("sidebar")
            .classList.toggle("active");
    });


// ================= DATATABLE =================
$(document).ready(function () {

    $('.datatable').DataTable({
        responsive: true,
        pageLength: 7,
        lengthMenu: [5, 10, 25],
        language: {
            url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
        }
    });

});


// ================= INICIALIZACION GENERAL =================
$(document).ready(function(){

    inicializarFechaActual();

    configurarBotonHoraActual();

    configurarSubmitFormulario();

});


// ================= FECHA ACTUAL =================
/**
 * Inicializa el campo fecha con la fecha actual
 * SOLO si el campo viene vacío (modo agregar).
 * En modo editar respeta el valor que envía Thymeleaf.
 */
function inicializarFechaActual(){

    let fechaInput = $("#fechaActividad");

    if(!fechaInput.val()){

        let hoy = new Date().toISOString().split("T")[0];

        fechaInput.val(hoy);

    }

}


// ================= BOTON HORA ACTUAL =================
/**
 * Inserta la hora actual al presionar el botón
 */
function configurarBotonHoraActual(){

    $("#btnHoraActual").click(function(){

        let ahora = new Date();

        let horas = ahora.getHours().toString().padStart(2,'0');

        let minutos = ahora.getMinutes().toString().padStart(2,'0');

        let horaActual = horas + ":" + minutos;

        $("#horaActividad").val(horaActual);

    });

}


// ================= SUBMIT FORMULARIO =================
/**
 * Combina fecha + hora en formato ISO
 * para enviarlo como LocalDateTime a Spring Boot
 */
function configurarSubmitFormulario(){

    $("form").submit(function(){

        let fecha = $("#fechaActividad").val();

        let hora = $("#horaActividad").val();

        if(fecha && hora){

            let fechaHora = fecha + "T" + hora;

            $("#horarioEntradaFinal").val(fechaHora);

        }

    });

}
</script>

</body>
</html>
