<!DOCTYPE html>
<html lang="es"
    xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}"
>
<body>
  <div class="container mt-4">
    <!-- ================= TITULO DINÁMICO ================= -->
    <!-- Si idUsuario es null → Agregar -->
    <!-- Si idUsuario tiene valor → Editar -->
    <h3 th:text="${usuario.idUsuario == null} ? 'Agregar Nuevo Usuario' : 'Editar Usuario'">Formuario Usuario</h3>

    <!--FORMULARIO-->
    <form th:action="@{/web/usuarios/guardar}"
      th:object="${usuario}"
          method="post"
    >
      <!-- ================= CAMPO OCULTO PARA EDICIÓN ================= -->
      <!-- Solo se usa cuando es edición -->
      <input type="hidden" th:field="*{idUsuario}">

      <!-- ================= NOMBRE ================= -->
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input th:field="${usuario.nombre}" type="text" class="form-control" placeholder="Ingrese nombre de usuario" required>
      </div>

      <!-- ================= E-MAIL ================= -->
      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input th:field="${usuario.correo}" ype="text" class="form-control" placeholder="Ingrese su e-mail" required >
      </div>
      <!-- ================= ESTATUS ================= -->
      <div class="mb-3">
        <label class="form-label">Estatus</label>
        <select th:field="*{estatus}" class="form-select">
          <option value="1">Sí</option>
          <option value="0">No</option>
        </select>
      </div>
      <div class="d-flex justify-content-between">
        <a th:href="@{/web/usuarios}" class="btn btn-secondary">Cancelar</a>
        <button type="submit"
                class="btn btn-primary"
                th:text="${usuario.idUsuario == null} ? 'Guardar' : 'Actualizar' "
                >
          Guardar
        </button>
      </div>
    </form>
  </div>
</body>
</html>
