<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::body})">
<body>

<div class="card shadow-sm">

    <div class="card-header bg-light">
        <h5>Listado de Usuarios</h5>
    </div>

    <div class="card-body">
        <a th:href="@{/web/usuarios/new}"
           class="btn btn-primary mb-3">
            Registrar Usuario
        </a>

        <div class="table-responsive">
            <table class="table table-striped table-hover datatable">
                <thead class="table-light">
                    <tr>
                        <th>Id</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Estatus</th>
                        <th>Fecha Registro</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.idUsuario}"></td>
                        <td th:text="${usuario.nombre}"></td>
                        <td th:text="${usuario.correo}"></td>
                        <td>
                            <span th:text="${usuario.estatus == 1 ? 'Activo' : 'Inactivo'}"
                                  th:class="${usuario.estatus == 1 ? 'estado-activo' : 'estado-inactivo'}">
                            </span>
                        </td>
                        <td th:text="${usuario.fechaCreacion.toLocalDate()}"></td>
                        <td>
                            <a th:href="@{/web/usuarios/new(id=${usuario.idUsuario})}"
                               class="btn btn-info text-white btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/web/usuarios/delete/{id}(id=${usuario.idUsuario})}"
                               class="btn btn-danger btn-sm">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
