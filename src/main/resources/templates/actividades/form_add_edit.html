<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}"
>

<body>

<div class="container mt-4">

  <!-- ================= TITULO DINÁMICO ================= -->

  <h3 th:text="${actividad.idActividad == null} ? 'Agregar Actividad' : 'Editar Actividad'">
    Formulario Actividad
  </h3>


  <form th:action="@{/web/actividades/guardar}"
        th:object="${actividad}"
        method="post"
  >

    <!-- ================= ID OCULTO ================= -->

    <input type="hidden" th:field="*{idActividad}">


    <!-- ================= USUARIO ================= -->

    <div class="mb-3">

      <label class="form-label">Usuario</label>

      <select th:field="*{usuario.idUsuario}" class="form-select" required>

        <option value="">Seleccione usuario</option>

        <option th:each="u : ${usuarios}"
                th:value="${u.idUsuario}"
                th:text="${u.nombre}">
        </option>

      </select>

    </div>


    <!-- ================= SALA ================= -->

    <div class="mb-3">

      <label class="form-label">Sala</label>

      <select th:field="*{sala.idSala}" class="form-select" required>

        <option value="">Seleccione sala</option>

        <option th:each="s : ${salas}"
                th:value="${s.idSala}"
                th:text="${s.nombre}">
        </option>

      </select>

    </div>


    <!-- ================= NOMBRE ACTIVIDAD ================= -->

    <div class="mb-3">

      <label class="form-label">Nombre Actividad</label>

      <input th:field="*{nombreActividad}"
             type="text"
             class="form-control"
             placeholder="Ej: , Teatro, canto, evaluaciones finales"
             required>

    </div>


    <!-- ================= FECHA ================= -->

    <div class="mb-3">

      <label class="form-label">Fecha</label>

      <input id="fechaActividad"
             type="date"
             class="form-control"
             required>

    </div>


    <!-- ================= HORA ================= -->

    <div class="mb-3">

      <label class="form-label">Hora de Entrada</label>

      <div class="input-group">

        <input id="horaActividad"
               type="time"
               class="form-control"
               step="60"
               required>

        <button type="button"
                class="btn btn-outline-secondary"
                id="btnHoraActual">

          Usar hora actual

        </button>

      </div>

    </div>


    <!-- ================= CAMPO OCULTO LOCALDATETIME ================= -->

    <input type="hidden"
           th:field="*{horarioEntrada}"
           id="horarioEntradaFinal">


    <!-- ================= BOTONES ================= -->

    <div class="d-flex justify-content-between">

      <a th:href="@{/web/actividades}" class="btn btn-secondary">

        Cancelar

      </a>

      <button type="submit"
              class="btn btn-primary"
              th:text="${actividad.idActividad == null} ? 'Guardar' : 'Actualizar'">

        Guardar

      </button>

    </div>

  </form>

</div>


</body>
</html>
