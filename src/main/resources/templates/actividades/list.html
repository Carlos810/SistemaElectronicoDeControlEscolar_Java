<!DOCTYPE html>
<html lang="es"
    xmlns:th="http://www.thymeleaf.org"
    th:replace="layout/base :: layout(~{::body})"
>

<body>
<div class="card shadow-sm">
    <div class="card-header bg-light">
        <h5>Listado actividades</h5>
    </div>
    <div class="card-body">
        <a th:href="@{/web/actividades/new}" class="btn btn-primary mb-3">Registrar Actividad</a>
        <div class="table-responsive">
            <table class="table table-striped table-hover datatable">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Actividad</th>
                    <th>Descripción Aula</th>
                    <th>Fecha</th>
                    <th>Hora Entrada</th>
                    <th>Hora Salida</th>
                    <th>Permanencia en Aula</th>
                    <th>Estatus</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="act:${actividades}">
                    <td th:text="${act.nombre}"></td>
                    <td th:text="${act.nombreActividad}"> </td>
                    <td th:text="${act.descripcion}"></td>
                    <td th:text="${act.fecha}"></td>
                    <td th:text="${act.horaEntrada}"></td>
                    <td th:text="${act.horaSalida}"></td>
                    <td th:text="${act.tiempoAulaHrs}"></td>
                    <td>
                         <span th:text="${(act.estatus == 1) ? 'Activo' : 'Inactivo'}"
                               th:class="${(act.estatus == 1) ? 'estado-activo' : 'estado-inactivo'}">
                         </span>
                    </td>
                    <td>
                        <a th:href="@{/web/actividades/new(id=${act.idActividad})}"
                           class="btn btn-info text-white btn-sm">
                            Editar
                        </a>
                        <a th:href="@{/web/actividades/delete/{id}(id=${act.idActividad})}"

                           class="btn btn-danger btn-sm">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
