<!DOCTYPE html>
<html lang="es"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="card shadow-sm">
    <div class="card-header bg-light">
        <h5>Listado de Salas</h5>
    </div>

    <div class="card-body">
        <a th:href="@{/web/salas/new}" class="btn btn-primary mb-3">Registrar Sala</a>
        <div class="table-responsive">
            <table class="table table-striped table-hover datatable">
                <thead>
                <tr>
                    <th>Id</th>
                    <th>Nombre Sala</th>
                    <th>Descripción</th>
                    <th>Disponible</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="sala:${salas}">
                    <td th:text="${sala.idSala}"></td>
                    <td th:text="${sala.nombre}"></td>
                    <td th:text="${sala.descripcion}"></td>
                    <td>
                        <span th:text="${sala.disponible == 1 ? 'Activa' : 'Inactiva'}"
                              th:class="${sala.disponible == 1 ? 'estado-activo' : 'estado-inactivo'}">
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/web/salas/new(id=${sala.idSala})}"
                           class="btn btn-info text-white btn-sm">
                            Editar
                        </a>
                        <a th:href="@{/web/salas/delete/{id}(id=${sala.idSala})}"

                           class="btn btn-danger btn-sm">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
