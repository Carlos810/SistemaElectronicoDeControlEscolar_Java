<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow border-0">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">
                    Confirmar Eliminación
                </h5>
            </div>

            <div class="card-body text-center">

                <p class="fs-5">
                    ¿Estás seguro que deseas eliminar la sala?
                </p>

                <div class="alert alert-warning">
                    <strong>ID:</strong>
                    <span th:text="${sala.idSala}"></span>
                    <br>
                    <strong>Nombre:</strong>
                    <span th:text="${sala.nombre}"></span>
                </div>

                <form th:action="@{/web/salas/toggle/{id}(id=${sala.idSala})}"
                      method="post">

                    <button type="submit"
                            class="btn btn-danger me-2">
                        Sí, eliminar
                    </button>

                    <a th:href="@{/web/salas}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
